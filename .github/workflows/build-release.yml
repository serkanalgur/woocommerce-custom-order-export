name: "Release ZIP"

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: "Build and Release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          extensions: gd, mbstring, xml, xmlreader, xmlwriter, curl, json, zip
          tools: composer

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Get tag version
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: ZIP plugin
        run: |
          mkdir -p build/woocommerce-custom-order-export
          # Copy files to release directory
          rsync -av . build/woocommerce-custom-order-export \
            --exclude=build \
            --exclude=.git \
            --exclude=.github \
            --exclude=tests \
            --exclude=.gitignore \
            --exclude=phpunit.xml \
            --exclude=composer.lock \
            --exclude=.DS_Store
          
          cd build
          zip -r "../woocommerce-custom-order-export-${{ steps.vars.outputs.tag }}.zip" woocommerce-custom-order-export/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "woocommerce-custom-order-export-${{ steps.vars.outputs.tag }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          generateReleaseNotes: true
          tag: v${{ steps.vars.outputs.tag }}
          name: Version ${{ steps.vars.outputs.tag }}
          draft: false
          prerelease: false
